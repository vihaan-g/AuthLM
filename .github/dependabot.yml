version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
        patterns: ["*"]
      development-dependencies:
        dependency-type: development
        patterns: ["*"]
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
