name: Bug Report
description: Report a bug in AuthLM
labels: [bug]
body:
  - type: input
    attributes:
      label: AuthLM Version
      placeholder: "0.1.0"
  - type: input
    attributes:
      label: Python Version
      placeholder: "3.11"
  - type: dropdown
    attributes:
      label: Operating System
      options: [macOS, Linux, Windows]
  - type: textarea
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Minimal code or CLI commands to reproduce
  - type: textarea
    attributes:
      label: Credential Store
      description: Run `authlm status --backend` and paste the output
