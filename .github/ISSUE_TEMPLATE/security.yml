name: Security Vulnerability
description: DO NOT USE. Report vulnerabilities privately.
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Do not report security vulnerabilities here.**

        Use GitHub's private vulnerability reporting:
        1. Go to the [Security tab](https://github.com/vihaan-g/authlm/security)
        2. Click "Report a vulnerability"
        3. Follow the instructions

        See [SECURITY.md](https://github.com/vihaan-g/authlm/blob/main/SECURITY.md) for our disclosure policy.
