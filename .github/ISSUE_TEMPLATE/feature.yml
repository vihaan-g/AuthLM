name: Feature Request
description: Suggest a new feature for AuthLM.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature.

  - type: checkboxes
    attributes:
      label: Pre-flight
      options:
        - label: I have searched the existing issues for this feature.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Is it a workflow you need to do often?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Code examples, links, screenshots.
